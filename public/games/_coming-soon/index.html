<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Coming soon</title>
    <style>
      :root {
        --bg: #0b0d17;
        --surface: #141829;
        --accent: #64ffda;
        --text: #e0e6ed;
        --muted: #8892a4;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Oxygen, Ubuntu, Cantarell, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
      }
      main {
        max-width: 36rem;
        text-align: center;
        background: var(--surface);
        border: 1px solid rgba(100, 255, 218, 0.12);
        border-radius: 16px;
        padding: 40px 28px;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
      }
      .eyebrow {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 12px;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 14px;
        line-height: 1.25;
      }
      .msg {
        font-size: 1rem;
        color: var(--muted);
        line-height: 1.6;
      }
      .hint {
        margin-top: 24px;
        font-size: 0.85rem;
        color: var(--muted);
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Coming soon</p>
      <h1 id="title">Demo</h1>
      <p id="msg" class="msg"></p>
      <p class="hint">Use the parent site&rsquo;s back control to return.</p>
    </main>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var title = params.get('title');
        var message = params.get('message');
        var titleEl = document.getElementById('title');
        var msgEl = document.getElementById('msg');
        if (title) {
          titleEl.textContent = title;
          document.title = title + ' — Coming soon';
        } else {
          titleEl.textContent = 'Coming soon';
        }
        if (message) {
          msgEl.textContent = message;
        } else {
          msgEl.textContent =
            'This demo is not ready yet. Check back later, or add the game build to public/games/<slug>/ and set comingSoon to false in games.ts.';
        }
      })();
    </script>
  </body>
</html>
